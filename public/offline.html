<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#020817" />
    <title>LifeOS — Offline</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; color: #e2e8f0; background: radial-gradient(circle at top right, #064e3b 0, #020817 42%); font-family: system-ui, sans-serif; }
      main { width: min(100%, 420px); padding: 28px; border: 1px solid rgba(148,163,184,.2); border-radius: 20px; background: rgba(2,8,23,.82); box-shadow: 0 24px 80px rgba(0,0,0,.35); }
      b { display: grid; width: 48px; height: 48px; place-items: center; border-radius: 14px; color: #6ee7b7; border: 1px solid rgba(52,211,153,.3); background: rgba(16,185,129,.12); }
      h1 { margin: 20px 0 8px; font-size: 24px; }
      p { margin: 0; color: #94a3b8; line-height: 1.6; }
      button { width: 100%; min-height: 44px; margin-top: 22px; border: 0; border-radius: 12px; color: #02120d; background: linear-gradient(135deg,#22d3ee,#22c55e); font-weight: 800; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <b>LO</b>
      <h1>Bạn đang ngoại tuyến</h1>
      <p>LifeOS chưa thể tải dữ liệu mới. Hãy kiểm tra mạng rồi thử lại.</p>
      <button onclick="location.reload()">Thử lại</button>
    </main>
  </body>
</html>
